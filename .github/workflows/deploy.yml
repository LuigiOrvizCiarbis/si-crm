name: Deploy to VPS

on:
  push:
    branches: [preprod]

permissions:
  contents: read

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # default 10m corta el build del front (Next.js + TS en el VPS tarda más)
          command_timeout: 40m
          script: |
            set -eu

            wait_for_http() {
              name="$1"
              url="$2"
              max_attempts="${3:-30}"
              attempt=1

              while [ "$attempt" -le "$max_attempts" ]; do
                if curl -fsS "$url" > /dev/null; then
                  echo "$name is healthy"
                  return 0
                fi

                echo "Waiting for $name ($attempt/$max_attempts)..."
                attempt=$((attempt + 1))
                sleep 5
              done

              echo "$name did not become healthy"
              return 1
            }

            cd /opt/apps/si-crm
            git fetch origin preprod
            git reset --hard origin/preprod

            # Backend
            cd crm-si-back
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d
            # -u www-data: exec como root crea logs/caches en storage que apache
            # (www-data) después no puede escribir → "Permission denied" al loguear
            docker compose -f docker-compose.prod.yml exec -T -u www-data app php artisan migrate --force
            docker compose -f docker-compose.prod.yml exec -T -u www-data app php artisan db:seed --class=ProductionSeeder --force
            docker compose -f docker-compose.prod.yml exec -T -u www-data app php artisan optimize:clear
            docker compose -f docker-compose.prod.yml exec -T -u www-data app php artisan config:clear
            docker compose -f docker-compose.prod.yml exec -T -u www-data app php artisan cache:clear
            docker compose -f docker-compose.prod.yml exec -T -u www-data app php artisan config:cache
            docker compose -f docker-compose.prod.yml exec -T -u www-data app php artisan view:cache
            docker compose -f docker-compose.prod.yml exec -T -u www-data app php artisan queue:restart || true
            docker compose -f docker-compose.prod.yml ps
            wait_for_http "Backend" "http://localhost:8000"

            # Frontend (production build)
            cd ../crm-si-front
            docker compose --env-file .env.production -f docker-compose.prod.yaml build
            docker compose --env-file .env.production -f docker-compose.prod.yaml up -d
            docker compose --env-file .env.production -f docker-compose.prod.yaml ps
            wait_for_http "Frontend" "http://localhost:3000"
