# Docker Compose - PRODUCCION
# No usar bind mounts. DB y Redis no exponen puertos al host.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: always
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      SENTRY_ENVIRONMENT: production
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PORT: "6379"
      BROADCAST_CONNECTION: reverb
      REVERB_HOST: reverb
      REVERB_PORT: "8080"
      REVERB_SCHEME: "http"
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      MAIL_MAILER: ${MAIL_MAILER}
      MAIL_SCHEME: ${MAIL_SCHEME}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      FRONTEND_URL: ${FRONTEND_URL}
    env_file:
      - .env
    ports:
      - "8000:80"
    volumes:
      - app-storage:/var/www/html/storage
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      # /api/health valida DB + Redis (no solo que PHP responda). 503 si algo está caído.
      test: ["CMD", "curl", "-f", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - laravel-network

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: always
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      SENTRY_ENVIRONMENT: production
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PORT: "6379"
      BROADCAST_CONNECTION: reverb
      REVERB_SERVER_HOST: "0.0.0.0"
      REVERB_SERVER_PORT: "8080"
      REVERB_HOST: "0.0.0.0"
      REVERB_PORT: "8080"
      REVERB_SCHEME: "http"
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    healthcheck:
      # Reverb expone un endpoint de health propio en /up (responde "OK" por HTTP).
      # Confirma que el servidor WebSocket procesa requests, no solo que el puerto está abierto.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/up || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - laravel-network

  # Worker de colas: procesa jobs (ej. GenerateAiReplyJob de auto-respuesta IA).
  # Sin él, los jobs encolados en Redis nunca se ejecutan en producción.
  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: always
    command: php artisan queue:work redis --tries=1 --timeout=130 --sleep=3
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      SENTRY_ENVIRONMENT: production
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PORT: "6379"
      BROADCAST_CONNECTION: reverb
      REVERB_HOST: reverb
      REVERB_PORT: "8080"
      REVERB_SCHEME: "http"
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    env_file:
      - .env
    volumes:
      - app-storage:/var/www/html/storage
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      # Verifica que el proceso del worker siga vivo.
      test: ["CMD-SHELL", "pgrep -f 'queue:work' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - laravel-network

  # Scheduler: corre las tareas programadas de routes/console.php (ej. purga de
  # webhook_deliveries vía model:prune). Sin este proceso, Schedule::command()
  # nunca se dispara en producción y la tabla crece sin límite.
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: always
    command: php artisan schedule:work
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      SENTRY_ENVIRONMENT: production
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PORT: "6379"
      BROADCAST_CONNECTION: reverb
      REVERB_HOST: reverb
      REVERB_PORT: "8080"
      REVERB_SCHEME: "http"
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    env_file:
      - .env
    volumes:
      - app-storage:/var/www/html/storage
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      # Verifica que el proceso del scheduler siga vivo.
      test: ["CMD-SHELL", "pgrep -f 'schedule:work' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - laravel-network

  db:
    image: postgres:16-alpine
    restart: always
    command: postgres -c max_connections=200
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - laravel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    volumes:
      - redis-data:/data
    networks:
      - laravel-network
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  app-storage:
    driver: local

networks:
  laravel-network:
    driver: bridge
