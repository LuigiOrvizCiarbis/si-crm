services:
  app:
    build:
      context: .
      target: runner
      args:
        NEXT_PUBLIC_FACEBOOK_APP_ID: ${NEXT_PUBLIC_FACEBOOK_APP_ID}
        NEXT_PUBLIC_FACEBOOK_CONFIGURATION_ID: ${NEXT_PUBLIC_FACEBOOK_CONFIGURATION_ID}
        NEXT_PUBLIC_FACEBOOK_GRAPH_API_VERSION: ${NEXT_PUBLIC_FACEBOOK_GRAPH_API_VERSION:-v24.0}
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - FACEBOOK_APP_SECRET=${FACEBOOK_APP_SECRET}
      - API_INTERNAL_URL=${API_INTERNAL_URL:-http://host.docker.internal:8000}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
